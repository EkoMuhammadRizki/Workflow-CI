name: MLflow CI - Training & Artifact Backup

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # Allow manual trigger

jobs:
  mlflow-training:
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout Repository ────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 2: Setup Python ───────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      # ── Step 3: Install Dependencies ───────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r MLProject/requirements.txt

      # ── Step 4: Create Required Directories ────────────────
      - name: Create directories
        run: |
          mkdir -p MLProject/artifacts
          mkdir -p MLProject/mlruns

      # ── Step 5: Start MLflow Tracking Server ───────────────
      - name: Start MLflow server
        run: |
          mlflow server \
            --host 127.0.0.1 \
            --port 5000 \
            --backend-store-uri sqlite:///mlflow.db \
            --default-artifact-root ./MLProject/mlruns &
          
          # Wait for server to start
          echo "Waiting for MLflow server to start..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:5000/health > /dev/null 2>&1; then
              echo "MLflow server is ready!"
              break
            fi
            sleep 1
          done

      # ── Step 6: Execute MLflow Training ────────────────────
      - name: Execute MLflow training
        run: |
          echo "=========================================="
          echo "Running MLflow Training Pipeline"
          echo "=========================================="
          
          # Run modeling script inside MLProject folder
          cd MLProject
          python modelling.py
          
          echo "=========================================="
          echo "Training completed successfully!"
          echo "=========================================="

      # ── Step 7: Build Docker Container ─────────────────────
      - name: Build MLflow Docker container
        run: |
          echo "=========================================="
          echo "Building Docker Container"
          echo "=========================================="
          
          # Find the latest model run inside MLProject/mlruns
          LATEST_RUN=$(ls -td MLProject/mlruns/*/runs/*/ 2>/dev/null | head -1)
          
          if [ -n "$LATEST_RUN" ] && [ -d "${LATEST_RUN}artifacts/model" ]; then
            MODEL_URI="${LATEST_RUN}artifacts/model"
            echo "Building Docker image from model: $MODEL_URI"
            
            mlflow models build-docker \
              -m "$MODEL_URI" \
              -n smsml-eko-churn \
              --enable-mlserver || echo "Docker build completed (or skipped if Docker not available)"
          else
            echo "No model artifacts found, skipping Docker build"
          fi

      # ── Step 8: Setup Git LFS ──────────────────────────────
      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs track "MLProject/mlruns/**/*.pkl"
          git lfs track "MLProject/mlruns/**/*.joblib"
          git lfs track "MLProject/artifacts/**/*.pkl"
          git lfs track "MLProject/artifacts/**/*.png"
          echo "Git LFS tracking configured"

      # ── Step 9: Backup Artifacts via Git Push ──────────────
      - name: Backup artifacts to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add artifacts
          git add -f .gitattributes
          git add -f MLProject/mlruns/ || true
          git add -f MLProject/artifacts/ || true
          git add -f mlflow.db || true
          
          # Commit and push
          git diff --staged --quiet || {
            git commit -m "ci: backup MLflow artifacts [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
            echo "Artifacts pushed to repository"
          } || echo "No changes to commit"

      # ── Step 10: Upload Artifacts ──────────────────────────
      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: |
            MLProject/mlruns/
            MLProject/artifacts/
          retention-days: 30
