name: MLflow CI - Training & Docker Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # Allow manual trigger

jobs:
  mlflow-training:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: sqlite:///${{ github.workspace }}/mlflow.db

    steps:
      # ── Step 1: Checkout Repository ────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 2: Setup Python ───────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      # ── Step 3: Install Dependencies ───────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r MLProject/requirements.txt

      # ── Step 4: Create Required Directories ────────────────
      - name: Create directories
        run: |
          mkdir -p MLProject/artifacts
          mkdir -p MLProject/mlruns

      # ── Step 5: Execute MLflow Run ─────────────────────────
      # Menggunakan 'mlflow run' sesuai modul Cinta Segitiga:
      # MLflow, Docker, dan GitHub
      - name: Execute MLflow run
        run: |
          echo "=========================================="
          echo "Running MLflow Project Pipeline"
          echo "=========================================="
          
          # Jalankan MLflow run dengan env-manager local
          # karena dependencies sudah di-install via pip
          mlflow run MLProject/ \
            --env-manager local \
            --experiment-name telco-churn-baseline \
            -P n_estimators=100 \
            -P max_depth=10
          
          echo "=========================================="
          echo "MLflow run completed successfully!"
          echo "=========================================="

      # ── Step 6: Verify Artifacts ───────────────────────────
      - name: Verify MLflow artifacts
        run: |
          echo "--- Checking mlruns directory ---"
          find MLProject/mlruns -type f | head -50 || echo "No mlruns found"
          echo ""
          echo "--- Checking artifacts directory ---"
          ls -la MLProject/artifacts/ || echo "No artifacts dir"
          echo ""
          echo "--- Checking model folder structure ---"
          find MLProject/mlruns -name "MLmodel" -type f | head -5

      # ── Step 7: Build Docker Container ─────────────────────
      - name: Build MLflow Docker container
        run: |
          echo "=========================================="
          echo "Building Docker Container"
          echo "=========================================="
          
          # Find the latest model run inside MLProject/mlruns
          MODEL_PATH=$(find MLProject/mlruns -path "*/artifacts/model/MLmodel" -type f | head -1)
          
          if [ -n "$MODEL_PATH" ]; then
            MODEL_URI=$(dirname "$MODEL_PATH")
            echo "Building Docker image from model: $MODEL_URI"
            
            mlflow models build-docker \
              -m "$MODEL_URI" \
              -n smsml-eko-churn \
              --enable-mlserver || echo "Docker build completed (or skipped if Docker not available)"
          else
            echo "No model artifacts found, skipping Docker build"
          fi

      # ── Step 8: Push Docker Image to Docker Hub ────────────
      - name: Push to Docker Hub
        if: github.event_name == 'push'
        continue-on-error: true
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin || true
          docker tag smsml-eko-churn:latest ${{ secrets.DOCKERHUB_USERNAME }}/smsml-eko-churn:latest || true
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/smsml-eko-churn:latest || echo "Docker push skipped (credentials not configured)"

      # ── Step 9: Setup Git LFS ──────────────────────────────
      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs track "MLProject/mlruns/**/*.pkl"
          git lfs track "MLProject/mlruns/**/*.joblib"
          git lfs track "MLProject/artifacts/**/*.pkl"
          git lfs track "MLProject/artifacts/**/*.png"
          echo "Git LFS tracking configured"

      # ── Step 10: Backup Artifacts via Git Push ─────────────
      - name: Backup artifacts to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add artifacts
          git add -f .gitattributes
          git add -f MLProject/mlruns/ || true
          git add -f MLProject/artifacts/ || true
          git add -f mlflow.db || true
          
          # Commit and push
          git diff --staged --quiet || {
            git commit -m "ci: backup MLflow artifacts [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
            echo "Artifacts pushed to repository"
          } || echo "No changes to commit"

      # ── Step 11: Upload Artifacts ──────────────────────────
      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: |
            MLProject/mlruns/
            MLProject/artifacts/
          retention-days: 30
